<html>
<head><title>Even or Odd </title></head>
<body>
  <hr><h2> Even or Odd Saparation in an Array </h2><hr>
  <script>
  // =============================== Variable Declaration ============================
     let n, arr;
  n = parseInt(prompt("Enter the Array Limit (N) : "));
  arr = new Array(n);
  for(i=0;i<n;i++) arr[i] = parseInt(prompt("Enter the Array Elements : "));
  // ======== Display the Original Array =======================
    document.write("<hr>Original Array is : [ ");
    for(i=0;i<n;i++) document.write( arr[i] + " ");
      document.write(" ] <hr>");
  // ====================== Process to Saparation ==========================
    let even = [], ec = 0, odd = [], oc = 0;
      for(i=0;i<n;i++) {
        if(arr[i]%2==0) {
          even[ec] = arr[i];
          ec++;
        }else {
          odd[oc] = arr[i];
          oc++;
        }
      }
  // ======================= Display Saparated Arrays ====================
        document.write ( "Even Array is  : [ ");
        for(i=0;i<even.length;i++) document.write(even[i] + " ");
          document.write("] <hr>");
        document.write("Odd Array is : [ ");
        for(i=0;i<odd.length;i++) document.write(odd[i] + " ");
          document.write("] <hr>");
  </script>
</body>
</html>
