<html>
<head><title>Matrices Addition</title></head>
<body>
  <hr><h2>Addition of two Matrices</h2><hr>
  <script>
 // =-------------=---------------=----- Variable Declaration --------=-------------=-------
    let i,j,ma,mb,mc,m,n,p,q;
 // ========================== Read Matrices Rows and Colomns Limits =====================
    m = parseInt(prompt("Enter the First Matrix Row Limit : "));
    n = parseInt(prompt("Enter the First Matrix Column Limit : "));
    p = parseInt(prompt("Enter the Second Matrix Row Limit : "));
    q = parseInt(prompt("Enter the Second Matrix Column Limit : "));
 // ============================ Memory Allocation ================================
  if (m==p && n==q) {
    ma = new Array(m);
    mb = new Array(p);
    mc = new Array(m);
    
    for(i=0;i<m;i++) {
     ma[i] = new Array(m,n);
     mb[i] = new Array(p,q);
     mc[i] = new Array(m,n);
    }
 // ================================= Read Matrices Values ==============================
    for(i=0;i<m;i++) {
        for(j=0;j<n;j++) {
  ma[i][j] = parseInt(prompt("Enter the First Matrix Element : "));
        }
    }
      // Display First Matrix (ma) -----
      document.write("First Matrix is : <br>");
    for(i=0;i<m;i++) {
        for(j=0;j<n;j++) {
          document.write(ma[i][j] + " ");
        } document.write("<br>");
    }
  } else document.write("Matrix Addition not possible");
  </script>
</body>
</html>
