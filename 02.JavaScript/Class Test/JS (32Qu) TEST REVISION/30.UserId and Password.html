<html>
<head><title>UserIdPasswordValidation</title></head>
<body>
  <hr><h2>User Id and Password Validation </h2><hr>
  <form>
    <pre>
Enter User Id  :  <input type='text' id='userId' placeholder='Enter User Id' required> (Allowed only AlphaNumerics having at least one charactr in upper case)
<p id='userIdMessage'></p>
Entere Passowrd : <input type='password' id='password' placeholder='Enter Password' required> (Password Consists Only AlphaNumerics and at least one special character)
<p id='passwordMessage'></p>
<button type='button' onclick ='validateForm()'> Validate </button>   <input type='reset' id='reset' value='Cancel'>
    </pre>
  </form>
  <script>
 // ========================= Function Creation ======================
    function validateForm() {
      let userId = document.getElementById('userId').value;
      let userIdMessage = document.getElementById('userIdMessage');
      let password = document.getElementById('password').value;
      let passwordMessage = document.getElementById('passwordMessage');
      
  //-------=================== Regex Expresion ============================---------------
      const idRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])[A-Za-z0-9]{6,}$/;
      const passwordRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[?!@#$%^&*])[A-Za-z0-9?!@#$%^&*]{8,14}$/;
      
  // ++++++++++++++ User Id Validation +++++++++++++++++++
      if(idRegex.test(userId)) {
        userIdMessage.style.color='green';
        userIdMessage.textContent='Valid User Id';
      } else { userIdMessage.style.color='red';
            userIdMessage.textContent='Enter a valid User Id'; }
  // ++++++++++++++ User Password Validation ++++++++++++++++++
      if(passwordRegex.test(password)) {
        passwordMessage.style.color='green';
        passwordMessage.textContent='Strong Password';
      } else { passwordMessage.style.color='red';
            passwordMessage.textContent='Enter a valid &  Strong Password'; }
    }
</script>      
</body>
</html>
