<!-- ============================= Same Code Practice Again ========================== --> 
<html>
<head><title>Arithmetic Operation</title></head>
<body>
  <h2>Arithmetic Operators Using Switch</h2>
  <hr>
  <script>
// ==================== Variable Declaration & Initialization ===========================
   var a,operator,b,result;
// =======================Input Reading from the User ===================================
   a        = parseInt(prompt("Enter the First Operand (A) : "));
   operator = prompt("Enter any Operator (like +,-,*,/,%,**) : ");
   b        = parseInt(prompt("Enter the Second Operand (B) : "));
// ======================== Process for Switch =========================================
   switch(operator) {
     case "+" : result = a + b; break;
     case "-" : result = a - b; break;
     case "*" : result = a * b; break;
     case "/" : if(b == 0 ) result = "Error! Cannot be divided by Zero";
                else result = a / b; 
                break;
     case "%" : if(b == 0 ) result = "Error! Cannot be divided by Zero";
                else result = a % b; 
                break;
     case "**" : result = a ** b; break;
     default : result = "Invilid Operator!! Please Choose an Appropriate Operator";
   }  
// =========================== Display Result & Output =================================
  document.write("<hr> Result : ");
  document.write(a + " " + operator + " " + b + " = " + result + "<hr>");  
  </script>
</body>
</html>
