
<html>
<head><title>Employee Table</title></head>
<body>
  <center>
  <hr><h2>Employee table Using Array Constractor </h2>
  <script>
  function Employee(empId,empName, basicPay, deduct) {
      this.empIdKey = empId;
      this.empNameKey = empName;
      this.basicPayKey = basicPay;
      this.deductKey = deduct;
     let hra = (basicPay*0.30);
     let ta = (basicPay*0.10);
     let da = (basicPay*0.53);
      this.totalKey = (basicPay+hra+ta+da);
      this.netKey = (this.totalKey-deduct);
  };
    let employee = [
        new Employee(101,"Bob",35000,15000),
        new Employee(102,"Alice",45000,10500),
        new Employee(103,"Tom",45000,54000),
        new Employee(104,"Motu",67000,5600),
        new Employee(105,"Patlu",23000,3400),
    ];
   document.write("<table border='2' cellspacing='0' cellpadding='10' align='center'>");
     document.write("<tr><th>Employee Id </th><th>Employee Name</th><th>Basic Pay</th><th>Deduction</th><th>Total Salary</th><th>Net Salary</th></tr>");
    for(let i=0;i<employee.length;i++) {
      document.write("<tr><td>"+employee[i].empIdKey+"</td><td>"+employee[i].empNameKey+"</td><td>"+employee[i].basicPayKey+"</td><td>"+employee[i].deductKey+"</td><td>"+employee[i].totalKey+"</td><td>"+employee[i].netKey+"</td></tr>");
     }
  </script>
 </center>
</body>
</html>
