<html>
<head> </head>
<body>
    <h1> Interest Calculation : </h1>
    <script type="text/javascript" charset="utf-8">
    // ++++++++ Initialization Variable Declaration +++++++++++++
        let p,n,r;
        p = parseInt(prompt("Enter the value of Principle = "));
        n = parseInt(prompt("Enter the Number of Years = "));
        r = parseInt(prompt("Enter the Rate of Interest = "));
    // +++++++++++++ Interest Calculation ++++++++++++
        let inrst = (p*r*n)/100;
    // ++++++ Display Result ++++++++++
        document.write("<hr>Principe is = " +p+ "<br> Time = " +n+ "<br> Rate of Interest is = " +r+ "<br><hr>");
        document.write(" Your Final Interest is = " +inrst + "<hr>");
    </script>
</body>
</html>
