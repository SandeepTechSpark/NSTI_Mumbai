<html>

<body>
    <h1> Checking the Given Number is Positive, Negative or Zero  : </h1>
    <script type="text/javascript" charset="utf-8">
// ++++++++++++ variable Declaration and Initialization ++++++++++
    let num = parseInt(prompt("Enter the Number which will be checked : "));
// +++++++++++++++++++++ Checking Process +++++++++++++++++++
    document.write("<hr>You have Entered the Number : " +num+"<br><hr>");
    if(num % 2 == 0) {
        document.write("("+ num + ") is an Even Number.");
        } else {
             document.write("("+ num + ") is an Odd Number.");
        }
    
    </script>
</body>
</html>
