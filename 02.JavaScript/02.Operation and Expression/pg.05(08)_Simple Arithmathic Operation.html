<html>
<head><title>Operation & Expression </title></head>
<body>
    <script type="text/javascript" charset="utf-8">
// +++++++++++++ Initialization and Variable Declaration ++++++++++++
        let a = 20;
        let b = 6;
// +++++++++ Display Result +++++++++++++++++
    document.write("A = " + a + "<br>"); // first variable display
    document.write("B = " + b + "<br>"); // second variable display
    document.write("<hr>");
    document.write("Addition (A+B) = " + (a+b) + ".<br>");
    document.write("Subtranction (A-B) = " + (a-b) + ".<br>");
    document.write("Multiplication (A*B)= " + (a*b) + ".<br>");
    document.write("Division (A/B) = "+ (a/b).toFixed(2) + ".<br>");
    document.write("Modulus (A%B) = " + (a%b) + ".<br>");
   document.write("Exponentiation (A**B) = "+(a**b) + ".<br>");
   document.write("Increament (++A) = " + (++a)+".<br>");
   document.write("Decreament (--A) = " + (--b)+ ".<br>");
    </script>
</body>
</html>
