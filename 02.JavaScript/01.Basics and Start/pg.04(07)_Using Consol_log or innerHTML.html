<html>
<head>
    <title>Console.log</title>
</head>
<body>
    <h1> Java Script </h1>
    <p id = "output"></p>
    <script type="text/javascript" charset="utf-8">
        let name ="Sandeep Pal";
        const age = 28;
        var city = "Ghazipur";
    // +++++++++++++++ Display in consol +++++++++++++++
        console.log ("Name : " + name);
        console.log ("Age : "+ age);
        console.log ("City : "+city);
    // +++++++++ Display in Webpage ++++++++++++++++
        document.getElementById("output").innerHTML ="Name : " + name + "<br> Age : " + age + "<br> City : " + city;
    </script>
</body>
</html>
