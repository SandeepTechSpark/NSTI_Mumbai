<html>
<head> 
 <h1>  Sum of - n Number using for loop  :</h1> <br><br>
      </head>
  <body>
  <script>
    //++++++++++++++++++ Input form User  and Variable Initialization ++++++++++++++++
   var num = parseInt(prompt(" Enter any Number :"));
   var sum = 0;
// +++++++++++ Process ++++++++++++++
   for (let i=1; i<=num; i++) {
        document.write(i + "  " + "<br>");
         sum += i;
   }
 // +++++++++++++ Display Result ++++++++++++
    document.write(" Sum of "+ num + " Numbers is : " + sum);
    </script>
</body>
</html>
